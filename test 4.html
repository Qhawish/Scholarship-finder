
<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Finder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 10px;
        }

        input {
            padding: 10px;
            width: 300px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .card {
            background: white;
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: 0.2s;
        }

            .card:hover {
                transform: scale(1.02);
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }

        .title {
            font-size: 18px;
            font-weight: bold;
        }

        a {
            display: inline-block;
            margin-top: 5px;
            color: blue;
        }
    </style>
</head>

<body>

    <h1>🎓 Scholarship Finder</h1>

    <input type="text" id="search" placeholder="Search (Engineering, Bank, etc)">

    <div id="list"></div>

    <script>

        // DATA (kau boleh tambah lagi nanti)
        const scholarships = [
        {
        name: "Petronas Scholarship",
        field: "Engineering",
        level: "Degree",
        deadline: "2026-05-01",
        link: "https://www.petronas.com"
        },
        {
        name: "Bank Negara Scholarship",
        field: "Economics",
        level: "Degree",
        deadline: "2026-04-30",
        link: "https://www.bnm.gov.my"
        },
        {
        name: "MARA Scholarship",
        field: "Engineering",
        level: "Diploma/Degree",
        deadline: "2026-06-15",
        link: "https://www.mara.gov.my"
        },
        {
        name: "Khazanah Scholarship",
        field: "All Fields",
        level: "Degree",
        deadline: "2026-03-31",
        link: "https://www.khazanah.com.my"
        }
        ];

        const list = document.getElementById("list");

        // DISPLAY FUNCTION
        function display(data) {
        list.innerHTML = "";

        data.forEach(s => {
        list.innerHTML += `
        <div class="card">
        <div class="title">${s.name}</div>
        <p>${s.field} | ${s.level}</p>
        <p>Deadline: ${s.deadline}</p>
        <a href="${s.link}" target="_blank">Apply</a>
        </div>
        `;
        });
        }

        // INITIAL LOAD
        display(scholarships);

        // SEARCH FUNCTION
        document.getElementById("search").addEventListener("input", function(e) {
        const value = e.target.value.toLowerCase();

        const filtered = scholarships.filter(s =>
        (s.name + s.field + s.level).toLowerCase().includes(value)
        );

        display(filtered);
        });

    </script>

</body>
</html>
